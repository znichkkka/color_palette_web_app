<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>История загрузок</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page">
    <nav class="navbar">
        <a class="logo" href="/">Color Palette</a>

        <div class="nav-actions">
            {{ header_links }}
        </div>
    </nav>

    <header class="header history-header">
        <div>
            <h1>История загрузок</h1>

            <p class="subtitle">
                Здесь отображаются сохранённые результаты анализа изображений.
            </p>
        </div>

        <button
            class="delete-button clear-history-button"
            type="button"
            onclick="clearHistory()"
        >
            Очистить историю
        </button>
    </header>

    <main class="card">
        <div class="history-list">
            {{ rows }}
        </div>
    </main>

    <div class="links">
        <a href="/">Загрузить новое изображение</a>
    </div>
</div>

<script>
function deleteImage(imageId) {
    if (!confirm("Удалить эту запись из истории?")) {
        return;
    }

    fetch("/api/images?id=" + imageId, {
        method: "DELETE"
    }).then(function(response) {
        return response.json();
    }).then(function(data) {
        if (data.success) {
            window.location.reload();
        } else {
            alert(data.error);
        }
    }).catch(function() {
        alert("Ошибка соединения с сервером");
    });
}

function clearHistory() {
    if (!confirm("Очистить всю историю загрузок? Это действие нельзя отменить.")) {
        return;
    }

    fetch("/api/history", {
        method: "DELETE"
    }).then(function(response) {
        return response.json();
    }).then(function(data) {
        if (data.success) {
            window.location.reload();
        } else {
            alert(data.error);
        }
    }).catch(function() {
        alert("Ошибка соединения с сервером");
    });
}
</script>
</body>
</html>
