<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page">
    <nav class="navbar">
        <a class="logo" href="/">Color Palette</a>

        <div class="nav-actions">
            <a class="nav-link" href="/">Главная</a>
            <a class="nav-button" href="/register">Регистрация</a>
        </div>
    </nav>

    <header class="header center">
        <h1>Вход в аккаунт</h1>

        <p class="subtitle">
            Войдите, чтобы сохранять результаты анализа в личной истории.
        </p>
    </header>

    <main class="card auth-card">
        {{ error }}

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Логин</label>

                <input
                    id="username"
                    type="text"
                    name="username"
                    placeholder="Введите логин"
                    autocomplete="username"
                    minlength="3"
                    maxlength="20"
                    pattern="[A-Za-z][A-Za-z0-9_]{2,19}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>

                <div class="password-field">
                    <input
                        id="password"
                        type="password"
                        name="password"
                        placeholder="Введите пароль"
                        autocomplete="current-password"
                        minlength="8"
                        maxlength="20"
                        required
                    >

                    <button
                        class="password-toggle"
                        type="button"
                        onclick="togglePassword('password', this)"
                        aria-label="Показать или скрыть пароль"
                    >
                        <svg
                            class="eye-icon"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M1 12C3.5 7 7 4 12 4s8.5 3 11 8c-2.5 5-6 8-11 8S3.5 17 1 12z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit">
                Войти
            </button>
        </form>

        <div class="auth-hint">
            Нет аккаунта?
            <a href="/register">Зарегистрироваться</a>
        </div>
    </main>
</div>

<script>
function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);

    if (input.type === "password") {
        input.type = "text";
        button.classList.add("active");
    } else {
        input.type = "password";
        button.classList.remove("active");
    }
}
</script>
</body>
</html>
